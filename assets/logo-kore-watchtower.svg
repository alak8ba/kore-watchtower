<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-watchtower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E1A20"/>
      <stop offset="100%" style="stop-color:#060C0F"/>
    </linearGradient>
    <filter id="glow-slate">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond hexagonal • cohérent avec les autres logos KORE -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-watchtower)" stroke="#6BA3B8" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#6BA3B8" stroke-width="0.5" opacity="0.3"/>

  <!-- Symbole : flèches circulaires (refresh / mise a jour auto)
       Cercle centre sur (100, 88), rayon 27. Zone : y=61 → y=115. -->

  <!-- Arc supérieur (sens horaire, de gauche vers droite) -->
  <path d="M 73 88 A 27 27 0 0 1 127 88"
        fill="none" stroke="#6BA3B8" stroke-width="3"
        stroke-linecap="round" filter="url(#glow-slate)"/>
  <!-- Pointe de flèche au point de sortie de l'arc supérieur (haut à droite) -->
  <polygon points="127,88 120,81 134,81" fill="#6BA3B8" filter="url(#glow-slate)"/>

  <!-- Arc inférieur (sens horaire, de droite vers gauche) -->
  <path d="M 127 88 A 27 27 0 0 1 73 88"
        fill="none" stroke="#6BA3B8" stroke-width="3"
        stroke-linecap="round" filter="url(#glow-slate)"/>
  <!-- Pointe de flèche au point de sortie de l'arc inférieur (bas à gauche) -->
  <polygon points="73,88 80,95 66,95" fill="#6BA3B8" filter="url(#glow-slate)"/>

  <!-- Cœur central : conteneur surveillé -->
  <rect x="92" y="80" width="16" height="16" rx="2"
        fill="none" stroke="#6BA3B8" stroke-width="1.8"
        filter="url(#glow-slate)"/>
  <circle cx="100" cy="88" r="1.8" fill="#6BA3B8"/>

  <!-- Texte KORE -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#6BA3B8" letter-spacing="3">KORE</text>

  <!-- Texte WATCHTOWER -->
  <text x="100" y="166" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="9" fill="#6BA3B8" opacity="0.6" letter-spacing="3">WATCHTOWER</text>
</svg>
