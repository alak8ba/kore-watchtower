<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-watchtower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond hexagonal • cohérent avec les autres logos KORE -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-watchtower)" stroke="#a855f7" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>

  <!-- Symbole : flèches circulaires (refresh / mise a jour auto)
       Deux arcs opposés formant un cercle, chacun terminé par une pointe -->

  <!-- Arc supérieur (sens horaire, de gauche vers droite) -->
  <path d="M 65 100 A 35 35 0 0 1 135 100"
        fill="none" stroke="#a855f7" stroke-width="3"
        stroke-linecap="round" filter="url(#glow-purple)"/>
  <!-- Pointe de flèche en haut à droite -->
  <polygon points="135,100 128,93 142,93" fill="#a855f7" filter="url(#glow-purple)"/>

  <!-- Arc inférieur (sens horaire, de droite vers gauche) -->
  <path d="M 135 100 A 35 35 0 0 1 65 100"
        fill="none" stroke="#a855f7" stroke-width="3"
        stroke-linecap="round" filter="url(#glow-purple)"/>
  <!-- Pointe de flèche en bas à gauche -->
  <polygon points="65,100 72,107 58,107" fill="#a855f7" filter="url(#glow-purple)"/>

  <!-- Cœur central : conteneur surveillé -->
  <rect x="92" y="92" width="16" height="16" rx="2"
        fill="none" stroke="#a855f7" stroke-width="1.8"
        filter="url(#glow-purple)"/>
  <circle cx="100" cy="100" r="1.8" fill="#a855f7"/>

  <!-- Texte KORE -->
  <text x="100" y="152" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#ffffff" letter-spacing="3">KORE</text>

  <!-- Texte WATCHTOWER (taille reduite pour rester dans l'hexagone) -->
  <text x="100" y="166" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="8" fill="#a855f7" opacity="0.85" letter-spacing="1.5">WATCHTOWER</text>
</svg>
